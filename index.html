<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0e0f11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Фит-трекер</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <!-- Onboarding -->
    <section class="screen" id="screen-onboarding">
      <div class="topbar"><h1>Настройка</h1><span class="sub">60 секунд</span></div>
      <div id="ob-body"></div>
    </section>

    <!-- Today -->
    <section class="screen" id="screen-today">
      <div class="topbar"><h1>Сегодня</h1><span class="sub" id="today-date"></span></div>
      <div id="today-body"></div>
    </section>

    <!-- Logger -->
    <section class="screen" id="screen-logger">
      <div class="topbar"><h1>Тренировка</h1><span class="sub">прошлый раз подставлен — подтверди</span></div>
      <div id="logger-body"></div>
    </section>

    <!-- Calendar -->
    <section class="screen" id="screen-history">
      <div class="topbar"><h1>Календарь</h1><span class="sub">тренировки и планы</span></div>
      <div id="history-body"></div>
    </section>

    <!-- Forecast -->
    <section class="screen" id="screen-forecast">
      <div class="topbar"><h1>Прогноз</h1><span class="sub">на 12 недель</span></div>
      <div id="forecast-body"></div>
    </section>

    <!-- Diagnosis -->
    <section class="screen" id="screen-diagnosis">
      <div class="topbar"><h1>Диагностика</h1><span class="sub">почему растёшь или нет</span></div>
      <div id="diagnosis-body"></div>
    </section>
  </div>

  <!-- bottom nav -->
  <nav class="tabbar">
    <button class="tab" data-go="today"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Сегодня</button>
    <button class="tab" data-go="forecast"><svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/></svg>Прогноз</button>
    <button class="tab center" data-go="logger"><span class="plus"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></button>
    <button class="tab" data-go="diagnosis"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Диагноз</button>
    <button class="tab" data-go="history"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Календарь</button>
  </nav>

  <!-- check-in sheet -->
  <div class="sheet-bg" id="sheet-bg"><div class="sheet" id="sheet"></div></div>
  <div id="toast" class="toast"></div>

  <script src="engine.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
    }
  </script>
  <style>
    .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
      background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:24px;font-weight:600;
      font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:40}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</body>
</html>
